{% extends "base.html" %}{% block content %}<section class="page-heading"><h1>Quadras</h1></section><section class="card-grid">{% for court in courts %}<article class="data-card"><h3>{{ court.name }}</h3><p>{{ court.city }} · {{ court.owner.email }}</p><span class="badge">{{ "Aprovada" if court.approved else "Pendente" }}</span><form method="post" action="{{ url_for('admin.approve_court', id=court.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn accent full">Aprovar</button></form></article>{% endfor %}</section>{% endblock %}
