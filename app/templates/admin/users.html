{% extends "base.html" %}{% block content %}<section class="page-heading"><h1>Usuarios</h1></section><section class="data-card table-wrap"><table><thead><tr><th>Nome</th><th>E-mail</th><th>Cidade</th><th>Status</th><th></th></tr></thead><tbody>{% for user in users %}<tr><td>{{ user.name }}</td><td>{{ user.email }}</td><td>{{ user.city }}</td><td>{{ "Ativo" if user.is_active else "Bloqueado" }}</td><td><form method="post" action="{{ url_for('admin.toggle_user', id=user.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn ghost">{{ "Bloquear" if user.is_active else "Desbloquear" }}</button></form></td></tr>{% endfor %}</tbody></table></section>{% endblock %}
